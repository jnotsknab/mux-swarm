  // ─── Event dispatcher ───
  function handleEvent(ev) {
    switch (ev.type) {

      case 'token_update':
        if (ev.tokens !== undefined && $('settingsTokens')) {
          $('settingsTokens').textContent = ev.tokens.toLocaleString();
        }
        break;

      case 'splash':
      case 'banner':
        break; // suppressed

      case 'step':
        appendHTML(`<div class="event event-step">Step ${ev.number} — ${esc(ev.title || '')}</div>`);
        break;

      case 'rule':
        appendHTML(`<div class="event event-rule">${ev.label ? esc(ev.label) : ''}</div>`);
        break;

      case 'success': appendText(ev.message, 'event-success'); break;
      case 'warning': 
        if (ev.message && (ev.message.includes('Cancelled by client') || ev.message.includes('Turn cancelled by user'))) break;
        appendText(ev.message, 'event-warning'); 
        break;
      case 'error':   appendText(ev.message, 'event-error'); break;
      case 'info':    
        if (ev.message && (ev.message.includes('Cancelled by client') || ev.message.includes('Turn cancelled by user'))) break;
        appendText(ev.message, 'event-info'); 
        break;
      case 'debug':   appendText(ev.message, 'event-debug'); break;

      case 'user_input': {
        const txt = ev.text || '';
        if (txt) {
          // Parse out [file: path] tags to render nice attachment chips
          let displayTxt = txt;
          let attachmentsHtml = '';
          const fileRegex = /\[file:\s*(.+?)\]/g;
          let match;
          
          while ((match = fileRegex.exec(txt)) !== null) {
            const path = match[1];
            const name = path.split(/[\\/]/).pop();
            const ext = getExt(name);
            const isImg = IMAGE_EXTS.has(ext);
            
            if (isImg) {
              // Try to load the image from the server
              const url = `/api/download/sandbox/${encodePath(path)}`;
              attachmentsHtml += `<div class="upload-preview" style="margin-bottom:8px; display:inline-flex"><img src="${url}" alt="" style="max-width:200px; max-height:200px; width:auto; height:auto; object-fit:contain" /></div><br>`;
            } else {
              const label = ext ? ext.replace('.','') : 'file';
              attachmentsHtml += `<div class="upload-preview" style="margin-bottom:8px; display:inline-flex"><div class="file-icon" style="width:24px;height:24px;font-size:8px">${esc(label)}</div><div class="upload-name" style="max-width:150px">${esc(name)}</div></div><br>`;
            }
          }
          
          // Remove the raw [file: ...] tags from the text
          displayTxt = displayTxt.replace(/\[file:\s*(.+?)\]\n?/g, '').trim();
          
          const el = document.createElement('div');
          el.className = 'user-msg';
          el.innerHTML = `<span class="bubble">${attachmentsHtml}<div>${renderMarkdown(displayTxt)}</div></span>`;
          const time = (ev.timestamp ? new Date(ev.timestamp) : new Date()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
          el.innerHTML += `<span class="msg-time">${time}</span>`;
          output.appendChild(el);
          scrollToBottom();
        }
        lastLocalSend = ''; // Clear this so we always render server echo
        break;
      }
      case 'body':
      case 'markup':
        if (ev.message && ev.message.length > 200) {
          // Long text (like /help) — render as formatted panel
          appendHTML(`<div class="stream-block">${renderMarkdown(ev.message)}</div>`);
        } else {
          appendText(ev.message, 'event-body');
        }
        break;

      case 'agent_turn_start':
        removeThinkingBar();
        finalizeStream();
        setBusy(true);
        const time = (ev.timestamp ? new Date(ev.timestamp) : new Date()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        appendHTML(`<div class=\"agent-turn\"><span class=\"agent-badge\">${esc(ev.agent || 'Agent')}</span><span class=\"msg-time\" style=\"margin-top:0;margin-left:4px\">${time}</span></div>`);
        break;

      case 'agent_turn_end':
        removeThinkingBar();
        finalizeStream();
        setBusy(false);
        break;

      case 'stream':
        setBusy(true);
        removeThinkingBar();
        if (!currentStreamEl) {
          currentStreamEl = document.createElement('div');
          currentStreamEl.className = 'stream-block';
          output.appendChild(currentStreamEl);
          currentStreamText = '';
        }
        currentStreamText += (ev.text || '');
        currentStreamEl.innerHTML = renderMarkdown(currentStreamText);
        scrollToBottom();
        break;

      case 'stream_end':
        removeThinkingBar();
        finalizeStream();
        setBusy(false);
        break;

      case 'thinking_start':
        setBusy(true);
        appendThinkingBar(ev.agent || '', '');
        break;

      case 'thinking_update': {
        const status = ev.status || '';
        // Parse "[calling: Tool_action, Tool_action2]" format from ThinkingIndicator
        const match = status.match(/\[calling:\s*(.+)\]/);
        if (match) {
          // If it's calling tools, just show a clean list of the tool names being called
          const rawTools = match[1].split(',').map(t => {
              let name = t.trim();
              if (name.startsWith('default_api:')) name = name.substring(12);
              return name.replace(/unknown/ig, '').trim();
          });
          
          let displayStr = rawTools.join(', ');
          updateThinkingBar(ev.agent || '', `<span style="color:var(--blue)">Calling:</span> ${esc(displayStr)}`);
        } else {
          // If it's raw thinking text, display it directly, no truncation
          let displayStr = status.replace(/\n/g, ' ').trim();
          updateThinkingBar(ev.agent || '', esc(displayStr));
        }
        break;
      }

      case 'thinking_end':
        removeThinkingBar();
        break;

      case 'tool_call':
        removeThinkingBar();
        appendHTML(`<div class="tool-call"><span class="tool-icon" style="display:flex;align-items:center;margin-top:1px">${icons.zap}</span> <span class="tool">${friendlyToolName(ev.tool || '', ev.agent || '', ev.arguments || ev.input)}</span></div>`);
        break;

      case 'tool_result':
      case 'function_result':
        // Display summary in main chat
        if (ev.summary) {
          const trunc = ev.summary.length > 150 ? ev.summary.substring(0, 150) + '...' : ev.summary;
          appendHTML(`<div class="tool-result">${esc(trunc)}</div>`);
        }
        
        // Render detailed diff/result in the Live Diffs panel
        let rawResult = ev.result || ev.output || ev.content || ev.text;
        if (rawResult) {
          const waitingMsg = diffsArea.querySelector('#diffs-waiting');
          if (waitingMsg) waitingMsg.remove();
          
          const timeStr = new Date().toLocaleTimeString();
          
          // Strip "unknown" from tool name
          let toolName = ev.tool || ev.function || 'Result';
          toolName = toolName.replace(/unknown/ig, '').trim();
          if (!toolName) toolName = 'Result';
          
          // Sanitize MCP JSON output if present
          let resultText = typeof rawResult === 'string' ? rawResult : JSON.stringify(rawResult);
          try {
            const parsed = typeof rawResult === 'string' ? JSON.parse(rawResult) : rawResult;
            if (parsed && Array.isArray(parsed.content)) {
               const textBlocks = parsed.content.filter(c => c.type === 'text').map(c => c.text);
               if (textBlocks.length > 0) {
                 resultText = textBlocks.join('\n');
               }
            } else if (parsed && parsed.content && typeof parsed.content === 'string') {
               resultText = parsed.content;
            } else if (parsed && parsed.result && typeof parsed.result === 'string') {
               resultText = parsed.result;
            }
          } catch (e) {
            // Not JSON, leave as is
          }
          
          let formattedContent = '';
          
          // Try to pretty-print if it's a JSON string
          let isJson = false;
          let jsonStr = resultText;
          if (typeof resultText === 'string' && (resultText.trim().startsWith('{') || resultText.trim().startsWith('['))) {
             try {
                const obj = JSON.parse(resultText);
                jsonStr = JSON.stringify(obj, null, 2);
                isJson = true;
             } catch(e) {}
          }
          
          if (isJson) {
             // Simple JSON syntax highlighter
             const highlighted = esc(jsonStr).replace(/("(\u[a-zA-Z0-9]{4}|\[^u]|[^\"])*"(\s*:)?|(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-boolean';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
            formattedContent = `<div class="diff-line diff-context">${highlighted}</div>`;
          } else {
             const lines = resultText.split('\n');
             
             // Basic diff detection
             const hasDiffHeaders = lines.some(l => l.startsWith('@@ ')) || (lines.some(l => l.startsWith('--- ')) && lines.some(l => l.startsWith('+++ ')));
             const isDiff = hasDiffHeaders;
             
             if (isDiff) {
                for (const line of lines) {
                   if (line.startsWith('+') && !line.startsWith('+++')) {
                      formattedContent += `<div class="diff-line diff-add">${esc(line)}</div>`;
                   } else if (line.startsWith('-') && !line.startsWith('---')) {
                      formattedContent += `<div class="diff-line diff-sub">${esc(line)}</div>`;
                   } else if (line.startsWith('@@ ')) {
                      formattedContent += `<div class="diff-line diff-info">${esc(line)}</div>`;
                   } else {
                      formattedContent += `<div class="diff-line diff-context">${esc(line)}</div>`;
                   }
                }
             } else {
                // Shell/Generic text formatting
                for (let i=0; i<lines.length; i++) {
                   const line = lines[i];
                   if (line.startsWith('--- STDOUT ---') || line.startsWith('--- STDERR ---')) {
                      formattedContent += `<div class="shell-header">${esc(line.replace(/---/g, '').trim())}</div>\n`;
                   } else if (line.startsWith('Status: ') || line.startsWith('Job ID: ') || line.startsWith('Command: ')) {
                      formattedContent += `<div class="shell-status">${esc(line)}</div>\n`;
                   } else {
                      formattedContent += `${esc(line)}\n`;
                   }
                }
             }
          }
          
          const diffHtml = `
            <div class="diff-container">
              <div class="diff-header">
                <span class="diff-header-badge">${esc(toolName)}</span>
                <span class="diff-time">${timeStr}</span>
              </div>
              <div class="diff-content">${formattedContent.trim()}</div>
            </div>
          `;
          
          // Prepend so newest is at the top
          diffsArea.insertAdjacentHTML('afterbegin', diffHtml);
        }
        break;

      case 'delegation':
        appendHTML(`<div class="delegation"><span class="deleg-icon" style="display:flex;align-items:center;margin-top:1px">${icons.arrowUpRight}</span> <span class="from">${esc(ev.from || '')}</span> <span class="deleg-arrow">delegated to</span> <span class="to">${esc(ev.to || '')}</span>${ev.task ? `<span class="task">${esc(ev.task.substring(0, 200))}</span>` : ''}</div>`);
        break;

      case 'task_complete':
        appendHTML(`<div class="task-complete"><span style="display:flex;align-items:center;margin-top:1px">${icons.check}</span> <span class="agent">${esc(ev.agent || '')}</span> <span style="color:var(--muted)">completed</span> ${ev.summary ? '— ' + esc(ev.summary) : ''}</div>`);
        break;

      case 'prompt':
        setBusy(false);
        input.focus();
        break;

      case 'input_request':  setBusy(false); renderInputPrompt(ev); break;
      case 'confirm_request': setBusy(false); renderConfirm(ev); break;
      case 'select_request':  setBusy(false); renderSelect(ev); break;
      case 'multiselect_request': setBusy(false); renderSelect(ev, true); break;

      case 'table': renderTable(ev); break;

      case 'panel':
        appendHTML(`<div class="panel-block"><div class="panel-header">${esc(ev.title || '')}</div><div class="panel-body">${esc(ev.content || '')}</div></div>`);
        break;

      case 'task_start': appendHTML(`<div class="event event-info" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.hourglass}</span> <span>${esc(ev.message || "")}</span></div>`); break;
      case 'task_done':
        
  appendHTML(`<div class="event event-success" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.check}</span> <span>${esc(ev.message || "")}</span></div>`); break;

      default:
        if (ev.message) {
          if (ev.message.includes('Cancelled by client') || ev.message.includes('Turn cancelled by user')) break;
          appendText(ev.message, 'event-info');
        }
        break;
    }
    scrollToBottom();
  }

  // ─── Rendering helpers ───
  function appendText(text, cls) {
    const el = document.createElement('div');
    el.className = `event ${cls || ''}`;
    el.textContent = text || '';
    output.appendChild(el);
  }

  function appendHTML(html) {
    const w = document.createElement('div');
    w.innerHTML = html;
    while (w.firstChild) output.appendChild(w.firstChild);
  }

  function finalizeStream() { currentStreamEl = null; currentStreamText = ''; }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      output.scrollTop = output.scrollHeight;
      // iOS Safari paint nudge
      output.style.transform = 'translateZ(0)';
    });
  }

  function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

  function renderMarkdown(raw) {
    let lines = esc(raw).split('\n');
    let result = [];
    let inCode = false;
    let codeBuf = [];
    let inList = false;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];

      // Code blocks
      if (line.trim().match(/^```/)) {
        if (inCode) {
          result.push('<div class="code-block"><button class="code-copy-btn" title="Copy" aria-label="Copy code">' + icons.copy + '</button><pre><code>' + codeBuf.join('\n') + '</code></pre></div>');
          codeBuf = [];
          inCode = false;
        } else {
          if (inList) { result.push('</div>'); inList = false; }
          inCode = true;
        }
        continue;
      }
      if (inCode) { codeBuf.push(line); continue; }

      // Horizontal rules
      if (line.trim().match(/^(-{3,}|\*{3,}|_{3,})$/)) {
        if (inList) { result.push('</div>'); inList = false; }
        result.push('<div style="border-bottom:1px solid var(--border);margin:10px 0"></div>');
        continue;
      }

      // Headers (h1-h4)
      let hm = line.match(/^(#{1,4})\s+(.+)/);
      if (hm) {
        if (inList) { result.push('</div>'); inList = false; }
        let lvl = hm[1].length;
        let sizes = ['16px','14px','13px','12px'];
        let colors = ['var(--blue)','var(--blue)','var(--fg)','var(--muted)'];
        result.push('<div style="font-weight:700;font-size:' + sizes[lvl-1] + ';color:' + colors[lvl-1] + ';margin:8px 0 4px">' + inlineMd(hm[2]) + '</div>');
        continue;
      }

      // List items
      let lm = line.match(/^(\s*)([-*]|\d+\.)\s+(.+)/);
      if (lm) {
        if (!inList) { result.push('<div style="margin:4px 0;padding-left:4px">'); inList = true; }
        let nested = lm[1].length > 1;
        let bullet = nested ? '\u25E6' : '\u2022';
        let pad = nested ? '24px' : '12px';
        result.push('<div style="padding:1px 0 1px ' + pad + ';position:relative;color:var(--fg)"><span style="position:absolute;left:' + (nested ? '12px' : '0') + ';color:var(--blue);font-size:10px">' + bullet + '</span>' + inlineMd(lm[3]) + '</div>');
        continue;
      }

      // Close list on non-list content
      if (inList && line.trim() === '') { result.push('</div>'); inList = false; continue; }
      if (inList && !lm) { result.push('</div>'); inList = false; }

      // Table rows (basic pipe tables)
      if (line.trim().match(/^\|.*\|$/)) {
        // Skip separator rows
        if (line.trim().match(/^\|[\s\-:|]+\|$/)) continue;
        let cells = line.split('|').filter(c => c.trim());
        let isHeader = i + 1 < lines.length && lines[i+1].trim().match(/^\|[\s\-:|]+\|$/);
        let tag = isHeader ? 'strong' : 'span';
        let isKV = cells.length === 2;
        let html = '<div style="overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;"><div style="display:grid;grid-template-columns:repeat(' + cells.length + ', minmax(150px, 1fr));gap:16px;padding:6px 12px;font-size:13px;border-bottom:1px solid ' + (isHeader ? 'var(--blue)' : 'var(--border)') + ';' + (isHeader ? 'background:var(--bg-input);' : '') + '">';
        cells.forEach((c, idx) => {
          let style;
          if (isHeader) {
            style = 'font-weight:700;color:var(--blue);letter-spacing:0.02em;';
          } else if (isKV && idx === 0) {
            style = 'font-weight:600;color:var(--fg);';
          } else {
            style = 'color:var(--text);';
          }
          html += '<' + tag + ' style="' + style + '">' + inlineMd(c.trim()) + '</' + tag + '>';
        });
        html += '</div></div>';
        result.push(html);
        continue;
      }

      // Empty line
      if (line.trim() === '') { result.push('<div style="height:6px"></div>'); continue; }

      // Regular text
      result.push('<div>' + inlineMd(line) + '</div>');
    }

    if (inList) result.push('</div>');
    if (inCode && codeBuf.length) result.push('<div class="code-block"><button class="code-copy-btn" title="Copy" aria-label="Copy code">' + icons.copy + '</button><pre><code>' + codeBuf.join('\n') + '</code></pre></div>');
    return result.join('');
  }

  function inlineMd(s) {
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--blue);text-decoration:none;border-bottom:1px dotted var(--blue)">$1</a>');
    s = s.replace(/(^|[^"'])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" style="color:var(--blue);text-decoration:none;border-bottom:1px dotted var(--blue)">$2</a>');
    return s;
  }

  /** Map raw MCP tool names like "Filesystem_read_file" to friendly descriptions */
  function friendlyToolName(raw, agent, args) {
    if (!raw) return 'Thinking...';
    let cleanName = raw.replace(/unknown/ig, '').trim();
    if (cleanName.startsWith('default_api:')) cleanName = cleanName.substring(12);

    // Try to parse args if it's a string
    let parsedArgs = null;
    if (args) {
        if (typeof args === 'string') {
            try {
                parsedArgs = JSON.parse(args);
            } catch (e) {
                // Ignore parse errors
            }
        } else if (typeof args === 'object') {
            parsedArgs = args;
        }
    }

    // --- 1. Try to format dynamically based on arguments (if available) ---
    if (parsedArgs) {
        if (cleanName === 'ReplShellMcp_execute_python' && parsedArgs.code) {
            if (parsedArgs.code.includes('import re')) return `<span style="color:var(--blue)">Writing regex script...</span>`;
            if (parsedArgs.code.includes('open(')) return `<span style="color:var(--blue)">Writing file script...</span>`;
            if (parsedArgs.code.includes('requests.get')) return `<span style="color:var(--blue)">Writing network script...</span>`;
            return `<span style="color:var(--blue)">Executing Python script...</span>`;
        }
        if (cleanName === 'ReplShellMcp_execute_command_async' && parsedArgs.command) {
            const cmd = parsedArgs.command.split(' ')[0];
            return `<span style="color:var(--blue)">Running command:</span> ${esc(cmd)}`;
        }
        if (cleanName === 'ask_user' && parsedArgs.question) {
            const q = parsedArgs.question.length > 30 ? parsedArgs.question.substring(0, 30) + '...' : parsedArgs.question;
            return `<span style="color:var(--blue)">Asking:</span> "${esc(q)}"`;
        }
        if (cleanName === 'analyze_image' && parsedArgs.imagePath) {
            const filename = parsedArgs.imagePath.split('/').pop();
            return `<span style="color:var(--blue)">Analyzing</span> ${esc(filename)}...`;
        }
        if (cleanName === 'BraveSearchMCP_brave_web_search' && parsedArgs.query) {
            return `<span style="color:var(--blue)">Searching Brave for</span> "${esc(parsedArgs.query)}"`;
        }
        if (cleanName === 'Fetch_fetch' && parsedArgs.url) {
            try {
                const domain = new URL(parsedArgs.url).hostname;
                return `<span style="color:var(--blue)">Fetching</span> ${esc(domain)}...`;
            } catch(e) {}
        }
        if ((cleanName === 'Filesystem_read_text_file' || cleanName === 'Filesystem_read_file') && parsedArgs.path) {
            const filename = parsedArgs.path.split('/').pop();
            return `<span style="color:var(--blue)">Reading</span> ${esc(filename)}...`;
        }
        if (cleanName === 'Filesystem_write_file' && parsedArgs.path) {
            const filename = parsedArgs.path.split('/').pop();
            return `<span style="color:var(--blue)">Writing</span> ${esc(filename)}...`;
        }
        if (cleanName === 'Filesystem_list_directory' && parsedArgs.path) {
            let p = parsedArgs.path;
            if (p === '.') p = 'current directory';
            else p = p.split('/').pop() || p;
            return `<span style="color:var(--blue)">Listing</span> ${esc(p)}...`;
        }
    }

    // --- 2. Fallback: Clean formatting (No random phrases) ---
    const idx = cleanName.indexOf('_');
    if (idx > 0) {
        const server = cleanName.substring(0, idx);
        const action = cleanName.substring(idx + 1);
        
        if (server === 'Filesystem') return `<span style="color:var(--muted)">File System:</span> ${esc(action)}`;
        if (server === 'ReplShellMcp') return `<span style="color:var(--muted)">Shell:</span> ${esc(action)}`;
        if (server === 'BraveSearchMCP') return `<span style="color:var(--muted)">Brave:</span> ${esc(action)}`;
        if (server === 'ShadcnUI') return `<span style="color:var(--muted)">Shadcn:</span> ${esc(action)}`;
        
        return `<span style="color:var(--muted)">${esc(server)}:</span> ${esc(action)}`;
    }
    
    return `<span style="color:var(--blue)">Tool:</span> ${esc(cleanName)}`;
  }

  // ─── Interactive prompts ───
  function renderInputPrompt(ev) {
    const block = document.createElement('div');
    block.className = 'prompt-block';
    block.innerHTML = `<div class="prompt-text">${renderMarkdown(ev.prompt || "Input:")}</div>`;
    const inp = document.createElement('textarea');
    inp.id = 'voice-prompt-input-' + Date.now();
    inp.name = inp.id;
    inp.rows = 1;
    inp.style.cssText = 'width:100%;background:var(--bg-input);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:6px 8px;font-family:var(--font-mono);font-size:12px;outline:none;resize:none;';
    if (ev.default) inp.placeholder = ev.default;
    const btn = document.createElement('button'); btn.textContent = 'Submit'; btn.style.marginTop = '6px';
    const submit = () => { const val = inp.value.trim() || ev.default || ''; sendRaw(val); block.innerHTML = `<div class="prompt-text" style="color:var(--muted)">${renderMarkdown(ev.prompt || "")}<div style="margin-top:8px;color:var(--text)">→ ${esc(val)}</div></div>`; };
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
    btn.addEventListener('click', submit);
    block.appendChild(inp); block.appendChild(btn);
    output.appendChild(block); scrollToBottom(); inp.focus();
  }

  function renderConfirm(ev) {
    const block = document.createElement('div');
    block.className = 'prompt-block';
    block.innerHTML = `<div class="prompt-text">${renderMarkdown(ev.prompt || "Confirm?")}</div>`;
    const respond = (val) => { sendRaw(val); block.innerHTML = `<div class="prompt-text" style="color:var(--muted)">${renderMarkdown(ev.prompt || "")}<div style="margin-top:8px;color:var(--text)">→ ${val}</div></div>`; };
    const y = document.createElement('button'); y.textContent = 'Yes'; y.addEventListener('click', () => respond('y'));
    const n = document.createElement('button'); n.textContent = 'No'; n.addEventListener('click', () => respond('n'));
    block.appendChild(y); block.appendChild(n);
    output.appendChild(block); scrollToBottom();
  }

  function renderSelect(ev, multi = false) {
    const block = document.createElement('div');
    block.className = 'prompt-block';
    block.innerHTML = `<div class="prompt-text">${renderMarkdown(ev.prompt || "Select:")}</div>`;
    const choices = ev.choices || [];
    const selected = new Set();
    choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.textContent = `${i + 1}. ${choice}`;
      if (multi) {
        btn.addEventListener('click', () => {
          if (selected.has(i + 1)) { selected.delete(i + 1); btn.style.borderColor = ''; btn.style.background = ''; }
          else { selected.add(i + 1); btn.style.borderColor = 'var(--accent)'; btn.style.background = 'rgba(100,180,220,0.1)'; }
        });
      } else {
        btn.addEventListener('click', () => { sendRaw(String(i + 1)); block.innerHTML = `<div class="prompt-text" style="color:var(--muted)">${renderMarkdown(ev.prompt || "")}<div style="margin-top:8px;color:var(--text)">→ ${esc(choice)}</div></div>`; });
      }
      block.appendChild(btn);
    });
    if (multi) {
      const s = document.createElement('button'); s.textContent = 'Submit'; s.style.marginTop = '6px';
      s.addEventListener('click', () => {
        const val = Array.from(selected).sort().join(',');
        sendRaw(val || '1');
        block.innerHTML = `<div class="prompt-text" style="color:var(--muted)">${renderMarkdown(ev.prompt || "")}<div style="margin-top:8px;color:var(--text)">→ ${Array.from(selected).sort().map(i => choices[i-1]).join(", ")}</div></div>`;
      });
      block.appendChild(document.createElement('br')); block.appendChild(s);
    }
    output.appendChild(block); scrollToBottom();
  }

  function renderTable(ev) {
    const rows = ev.rows || [];
    let h = '<div class="table-block"><table>';
    h += `<thead><tr><th colspan="2">${esc(ev.title || '')}</th></tr></thead><tbody>`;
    for (const r of rows) h += `<tr><td style="color:var(--muted)">${esc(r.key || '')}</td><td>${esc(r.value || '')}</td></tr>`;
    h += '</tbody></table></div>';
    appendHTML(h);
  }

  // ─── Sending ───
  let lastLocalSend = '';
  function sendRaw(text) {
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text);
  }

  
  function send(text) {
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    if (text.trim().toLowerCase() === '/clear') { appendText('/clear is disabled in web mode', 'event-warning'); return; }

    const cmd = text.trim().toLowerCase();
    if (['/agent', '/swarm', '/pswarm', '/stateless'].includes(cmd)) {
        activeSessionMode = cmd;
    } else if (cmd === '/exit' || cmd === '/qc') {
        activeSessionMode = null;
    }

    // Build message with pending attachments

    let fullMsg = text;
    if (pendingFiles.length > 0) {
      const refs = pendingFiles.map(f => `[file: ${f.path}]`).join('\n');
      fullMsg = refs + '\n' + text;
    }

    ws.send(fullMsg);
    lastLocalSend = text;

    // Clear pending (rendering is now handled by incoming user_input event)
    pendingFiles = [];
    attachmentsStrip.innerHTML = '';
  }

  input.addEventListener('keydown', (e) => {
    const sendMode = document.body.dataset.sendOnEnter || 'enter'; // 'enter' | 'ctrl'
    const wantsSend = (sendMode === 'ctrl')
      ? (e.key === 'Enter' && (e.ctrlKey || e.metaKey))
      : (e.key === 'Enter' && !e.shiftKey);
    if (wantsSend) {
      e.preventDefault();
      if (isAgentBusy) { sendRaw('__CANCEL__'); appendHTML(`<div class="event event-warning" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.stop}</span> <span>Cancel signal sent</span></div>`); return; }
      const text = input.value.trim();
      if (text || pendingFiles.length > 0) { send(text); input.value = ''; }
    }
  });

  statusBtn.addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      if (confirm('Are you sure you want to restart the server?')) {
        appendHTML(`<div class="event event-warning" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.refresh}</span> <span>Restarting server...</span></div>`);
        sendRaw('__CANCEL__');
        setTimeout(() => {
          sendRaw('/qc');
          setTimeout(() => {
            sendRaw('/exit');
          }, 1000);
        }, 2500);
      }
    } else {
      alert('Cannot restart: Not connected to server.');
    }
  });

  actionBtn.addEventListener('click', () => {
    if (isAgentBusy) { sendRaw('__CANCEL__'); appendHTML(`<div class="event event-warning" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.stop}</span> <span>Cancel signal sent</span></div>`); return; }
    const text = input.value.trim();
    if (text || pendingFiles.length > 0) { send(text); input.value = ''; }
  });



  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && ws && ws.readyState === WebSocket.OPEN && isAgentBusy) {
      sendRaw('__CANCEL__');
      appendHTML(`<div class="event event-warning" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.stop}</span> <span>Cancel signal sent</span></div>`);
    }
  });

  // ─── File uploads ───
  const IMAGE_EXTS = new Set(['.png','.jpg','.jpeg','.gif','.webp','.bmp','.svg']);

  function getExt(name) { const d = name.lastIndexOf('.'); return d >= 0 ? name.substring(d).toLowerCase() : ''; }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(1) + ' GB';
  }

  /** Encode path segments individually, preserving slashes. */
  function encodePath(p) {
    return p.split(/[\\/]/).map(s => encodeURIComponent(s)).join('/');
  }

  function renderUploadPreviewHTML(name, size, thumbUrl) {
    const ext = getExt(name);
    const isImg = IMAGE_EXTS.has(ext);
    const short = name.split(/[\\/]/).pop() || name;
    const sz = formatSize(size || 0);
    if (isImg && thumbUrl) {
      return `<div class="upload-preview"><img src="${thumbUrl}" alt="" /><div><div class="upload-name">${esc(short)}</div><div class="upload-size">${sz}</div></div></div>`;
    }
    const label = ext ? ext.replace('.','') : 'file';
    return `<div class="upload-preview"><div class="file-icon">${esc(label)}</div><div><div class="upload-name">${esc(short)}</div><div class="upload-size">${sz}</div></div></div>`;
  }

  function addPendingFile(path, name, size, thumbUrl) {
    pendingFiles.push({ path, name, size, thumbUrl });
    // Render in attachments strip
    const chip = document.createElement('div');
    chip.className = 'upload-preview';
    chip.style.cursor = 'pointer';
    chip.title = 'Click to remove';
    const ext = getExt(name);
    const isImg = IMAGE_EXTS.has(ext);
    const short = name.split(/[\\/]/).pop() || name;
    if (isImg && thumbUrl) {
      chip.innerHTML = `<img src="${thumbUrl}" alt="" /><div class="upload-name" style="max-width:120px">${esc(short)}</div>`;
    } else {
      const label = ext ? ext.replace('.','') : 'file';
      chip.innerHTML = `<div class="file-icon" style="width:24px;height:24px;font-size:8px">${esc(label)}</div><div class="upload-name" style="max-width:120px">${esc(short)}</div>`;
    }
    const idx = pendingFiles.length - 1;
    chip.addEventListener('click', () => { pendingFiles.splice(idx, 1); chip.remove(); });
    attachmentsStrip.appendChild(chip);
    input.focus();
  }

  const toastContainer = $('toastContainer');

  // Delegated copy-to-clipboard for code blocks
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.code-copy-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const block = btn.closest('.code-block');
    const code = block ? block.querySelector('code') : null;
    if (!code) return;
    const text = code.innerText;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      const original = btn.innerHTML;
      btn.classList.add('copied');
      btn.innerHTML = icons.check;
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = original; }, 1200);
    } catch (err) {
      showToast('Copy failed', 'error');
    }
  });

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span style="display:flex;align-items:center;gap:8px">${type === 'success' ? icons.check : icons.x} ${esc(msg)}</span>`;
    toastContainer.appendChild(t);
    setTimeout(() => {
      t.style.animation = 'fadeOutRight 0.3s forwards';
      setTimeout(() => t.remove(), 300);
    }, 4000);
  }

  async function uploadFile(file, targetDir) {
    const dir = targetDir || 'uploads';
    const formData = new FormData();
    formData.append('file', file);

    let thumbUrl = null;
    if (IMAGE_EXTS.has(getExt(file.name))) {
      try { thumbUrl = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.onerror = () => r(null); rd.readAsDataURL(file); }); } catch {}
    }

    try {
      const resp = await fetch(`/api/upload?dir=${encodeURIComponent(dir)}`, { method: 'POST', body: formData });
      const data = await resp.json();
      if (data.filename) {
        showToast(`Uploaded: ${data.name || file.name}`, "success");
        addPendingFile(data.filename, data.name || file.name, data.size || file.size, thumbUrl);
        if (sidebarOpen && currentTab === 'sandbox') loadFileList(currentPath);
      } else { showToast("Upload failed", "error"); }
    } catch (err) { console.error(err); showToast("Upload error. Check connection.", "error"); }
  }

  async function uploadBase64(base64, filename, targetDir) {
    const dir = targetDir || 'uploads';
    const ext = getExt(filename);
    const isImg = IMAGE_EXTS.has(ext);
    const size = Math.round((base64.length - (base64.indexOf(',') + 1)) * 0.75);

    try {
      const resp = await fetch(`/api/upload?dir=${encodeURIComponent(dir)}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ base64, filename })
      });
      const data = await resp.json();
      if (data.filename) {
        showToast(`Uploaded: ${data.name || filename}`, "success");
        addPendingFile(data.filename, data.name || filename, data.size || size, isImg ? base64 : null);
        if (sidebarOpen && currentTab === 'sandbox') loadFileList(currentPath);
      } else { showToast("Upload failed", "error"); }
    } catch (err) { console.error(err); showToast("Upload error. Check connection.", "error"); }
  }

  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => { const f = e.target.files[0]; if (f) uploadFile(f); fileInput.value = ''; });

  document.addEventListener('paste', async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.kind === 'file') {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) {
          const reader = new FileReader();
          reader.onload = async () => {
            const ext = file.name ? file.name.split('.').pop() : (file.type.split('/')[1] || 'bin');
            await uploadBase64(reader.result, `paste_${Date.now()}.${ext}`);
          };
          reader.readAsDataURL(file);
        }
        break;
      }
    }
  });

  // ─── Drag-drop: main window ───
  let dragCounter = 0;
  let sidebarDragActive = false;
  const dropOverlay = document.createElement('div');
  dropOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(100,180,220,0.08);border:2px dashed var(--accent);z-index:999;display:none;align-items:center;justify-content:center;pointer-events:none;';
  dropOverlay.innerHTML = '<div style="color:var(--accent);font-family:var(--font-mono);font-size:16px;font-weight:600">Drop files to upload</div>';
  document.body.appendChild(dropOverlay);

  document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; if (!sidebarDragActive) dropOverlay.style.display = 'flex'; });
  document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.style.display = 'none'; } });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', async (e) => {
    e.preventDefault(); dragCounter = 0; dropOverlay.style.display = 'none';
    if (sidebarDragActive) return;
    if (e.dataTransfer?.files) { for (const f of e.dataTransfer.files) await uploadFile(f); }
  });

  // ─── Drag-drop: sidebar ───
  sidebarContent.addEventListener('dragenter', (e) => { e.preventDefault(); e.stopPropagation(); if (currentTab !== 'sandbox') return; sidebarDragActive = true; dropOverlay.style.display = 'none'; sidebarContent.classList.add('drag-over'); });
  sidebarContent.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); if (!sidebarContent.contains(e.relatedTarget)) { sidebarDragActive = false; sidebarContent.classList.remove('drag-over'); } });
  sidebarContent.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
  sidebarContent.addEventListener('drop', async (e) => {
    e.preventDefault(); e.stopPropagation(); sidebarDragActive = false; sidebarContent.classList.remove('drag-over');
    if (currentTab !== 'sandbox') return;
    if (e.dataTransfer?.files) { for (const f of e.dataTransfer.files) await uploadFile(f, currentPath || 'uploads'); }
  });

  
  // ─── Sidebar Resizing ───
  const sidebarResizer = $('sidebarResizer');
  let isResizing = false;

  if (sidebarResizer) {
    sidebarResizer.addEventListener('mousedown', (e) => {
      if (window.innerWidth <= 768) return; // Disable on mobile
      isResizing = true;
      sidebarResizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none'; // Prevent text selection
    });

    window.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      // Calculate new width: window width minus mouse X position
      let newWidth = window.innerWidth - e.clientX;
      // Set min and max bounds for the sidebar width
      if (newWidth < 250) newWidth = 250;
      if (newWidth > window.innerWidth * 0.8) newWidth = window.innerWidth * 0.8;
      
      document.documentElement.style.setProperty('--sidebar-width', `${newWidth}px`);
    });

    window.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        sidebarResizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });
  }

  // ─── Sidebar ───
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    sidebar.classList.toggle('open', sidebarOpen);
    app.classList.toggle('sidebar-open', sidebarOpen);
    sidebarToggle.classList.toggle('active', sidebarOpen);
    if (sidebarOpen) {
      if (currentTab === 'diffs') {
        sidebarContent.innerHTML = '';
        sidebarContent.appendChild(diffsArea);
      } else {
        loadFileList();
      }
    }
  }
  sidebarToggle.addEventListener('click', toggleSidebar);
  sidebarClose.addEventListener('click', toggleSidebar);

  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentTab = tab.dataset.tab; currentPath = '';
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      
      if (currentTab === 'diffs') {
        sidebarContent.innerHTML = '';
        sidebarContent.appendChild(diffsArea);
      } else {
        loadFileList();
      }
    });
  });

  async function loadFileList(subpath = '') {
    sidebarContent.innerHTML = '<div class="loading">Loading...</div>';
    const url = subpath ? `/api/list/${currentTab}/${encodePath(subpath)}` : `/api/list/${currentTab}`;
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.error) { sidebarContent.innerHTML = `<div class="error-msg">${esc(data.error)}</div>`; return; }
      currentPath = data.path || '';
      let html = '';
      if (currentPath) {
        const parent = currentPath.split(/[\\/]/).slice(0,-1).join('/');
        html += `<div class="file-path"><button class="back-btn" data-path="${esc(parent)}">←</button><span>${esc(currentPath)}</span></div>`;
      }
      if (data.items?.length) {
        html += '<div class="file-list">';
        for (const item of data.items) {
          html += `<div class="file-item-container" data-path="${esc(item.path)}" data-isdir="${item.isDir}" data-name="${esc(item.name)}">
            <div class="file-item ${item.isDir ? 'dir' : 'file'}" title="${esc(item.name)}">
              <span class="icon" style="display:flex;align-items:center">${item.isDir ? icons.folder : icons.file}</span>
              <span class="name">${esc(item.name)}</span>
              ${item.size ? `<span class="size">${formatSize(item.size)}</span>` : ''}
              ${!item.isDir ? `<button class="dl-btn" data-dl="${esc(item.path)}" title="Download" style="display:flex;align-items:center;pointer-events:auto"><span style="pointer-events:none;display:flex">${icons.download}</span></button>` : ''}
            </div>
            
          </div>`;
        }
        html += '</div>';
      } else if (!currentPath) { html += '<div class="loading">Empty</div>'; }
      sidebarContent.innerHTML = html;

      sidebarContent.querySelectorAll('.file-item-container').forEach(container => {
        const el = container.querySelector('.file-item');
        el.addEventListener('click', async (e) => {
          const dlBtn = e.target.closest('.dl-btn');
          if (dlBtn) {
            window.open(`/api/download/${currentTab}/${encodePath(dlBtn.dataset.dl)}`, '_blank');
            return;
          }
          
          const isDir = container.dataset.isdir === 'true';
          const path = container.dataset.path;
          const name = container.dataset.name;

          if (isDir) {
            // Normal directory navigation
            loadFileList(path);
          } else {
            // File download
            window.open(`/api/download/${currentTab}/${encodePath(path)}`, '_blank');
          }
        });
      });
      sidebarContent.querySelector('.back-btn')?.addEventListener('click', (e) => loadFileList(e.target.dataset.path));
    } catch (err) { sidebarContent.innerHTML = `<div class="error-msg">Error: ${esc(err.message)}</div>`; }
  }

  // ─── Mobile Visibility & Reconnect Logic ───
  function forceReconnect() {
    appendHTML(`<div class="event event-info" style="display:flex;align-items:flex-start;gap:8px"><span style="margin-top:2px">${icons.refresh}</span> <span>Reconnecting...</span></div>`);
    statusDot.className = 'status-dot';
    statusText.textContent = 'reconnecting...';
    
    // Clean up existing connection
    if (ws) {
      // Remove onclose to prevent duplicate reconnect loops
      ws.onclose = null; 
      ws.close();
      ws = null;
    }
    
    // Reset backoff delay and reconnect immediately
    if (pingInterval) clearInterval(pingInterval);
    reconnectDelay = 1000;
    connect();
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      // When app comes to foreground, check if we need to reconnect immediately
      if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
        reconnectDelay = 500; // Reset backoff
        forceReconnect();
      }
    }
  });

  reconnectBtn.addEventListener('click', forceReconnect);

  
  // ─── Responsive Placeholder ───
  function updatePlaceholder() {
    input.placeholder = window.innerWidth <= 640 ? 'Message or /command...' : 'Type a message or /command...';
  }
  window.addEventListener('resize', updatePlaceholder);
  updatePlaceholder();

  // ─── Boot ───
  connect();
})();
</script>

<script>
(function(){
  const panel   = document.getElementById('muxPreviewPanel');
  const fab     = document.getElementById('muxPreviewFab');
  const header  = document.getElementById('muxPreviewHeader');
  const urlIn   = document.getElementById('muxPreviewUrl');
  const goBtn   = document.getElementById('muxPreviewGo');
  const rldBtn  = document.getElementById('muxPreviewReload');
  const extBtn  = document.getElementById('muxPreviewExternal');
  const popBtn  = document.getElementById('muxPreviewPopout');
  const maxBtn  = document.getElementById('muxPreviewMax');
  const closeBt = document.getElementById('muxPreviewClose');
  const body    = document.getElementById('muxPreviewBody');
  const resizer = document.getElementById('muxPreviewResize');

  let currentUrl = '';
  const isMobile = () => window.matchMedia('(max-width: 640px)').matches;

  function classify(src) {
    const u = (src || '').split('?')[0].split('#')[0].toLowerCase();
    const ext = u.includes('.') ? u.split('.').pop() : '';
    if (['png','jpg','jpeg','gif','webp','bmp','svg','ico','avif'].indexOf(ext) >= 0) return 'image';
    if (['mp4','webm','mov','mkv','m4v'].indexOf(ext) >= 0) return 'video';
    if (['mp3','wav','ogg','flac','m4a','aac'].indexOf(ext) >= 0) return 'audio';
    if (ext === 'pdf') return 'iframe';
    if (['txt','md','log','json','yaml','yml','toml','ini','csv','tsv','xml','js','ts','jsx','tsx','css','html','htm','py','rs','go','java','c','cpp','h','hpp','sh','bat','ps1'].indexOf(ext) >= 0) return 'text';
    return 'iframe';
  }

  async function renderInto(src, kind) {
    body.innerHTML = '<div class="mux-preview-empty">Loading...</div>';
    try {
      if (kind === 'image') {
        body.innerHTML = '';
        const img = document.createElement('img');
        img.className = 'mux-preview-media'; img.src = src; img.alt = '';
        body.appendChild(img);
      } else if (kind === 'video') {
        body.innerHTML = '';
        const v = document.createElement('video');
        v.className = 'mux-preview-media'; v.src = src; v.controls = true;
        body.appendChild(v);
      } else if (kind === 'audio') {
        body.innerHTML = '';
        const a = document.createElement('audio');
        a.className = 'mux-preview-media'; a.src = src; a.controls = true;
        body.appendChild(a);
      } else if (kind === 'text') {
        const resp = await fetch(src);
        const txt = await resp.text();
        body.innerHTML = '';
        const pre = document.createElement('pre');
        pre.className = 'mux-preview-text';
        pre.textContent = txt;
        body.appendChild(pre);
      } else {
        body.innerHTML = '';
        const f = document.createElement('iframe');
        f.src = src;
        f.referrerPolicy = 'no-referrer';
        f.sandbox = 'allow-scripts allow-forms allow-popups allow-same-origin';
        body.appendChild(f);
      }
    } catch (e) {
      body.innerHTML = '<div class="mux-preview-empty">Failed to load: ' + (e && e.message ? e.message : 'unknown error') + '</div>';
    }
  }

  function normalize(input) {
    if (!input) return '';
    const t = input.trim();
    if (/^(https?:|data:|blob:|\/)/i.test(t)) return t;
    return 'https://' + t;
  }

  function load(src, opts) {
    opts = opts || {};
    const url = normalize(src);
    if (!url) return;
    currentUrl = url;
    urlIn.value = url;
    const kind = opts.kind || classify(url);
    renderInto(url, kind);
  }

  function openPanel() {
    if (!isMobile() && !panel.style.left) {
      panel.style.left = Math.max(40, (window.innerWidth - 720) / 2) + 'px';
      panel.style.top  = Math.max(40, (window.innerHeight - 540) / 2) + 'px';
    }
    panel.classList.add('open');
    setTimeout(() => urlIn.focus(), 50);
  }
  function closePanel() { panel.classList.remove('open'); }

  // Drag/resize state for the FAB itself
  let fabDidInteract = false;
  fab.addEventListener('click', (e) => {
    if (fabDidInteract) { fabDidInteract = false; e.preventDefault(); e.stopPropagation(); return; }
    openPanel();
  });

  (function initFabDragResize(){
    const LS_KEY = 'muxPreviewFab.pos';
    const fabResize = document.getElementById('muxPreviewFabResize');

    function applyState(st){
      if (!st) return;
      fab.classList.add('placed');
      if (typeof st.left === 'number') fab.style.left = st.left + 'px';
      if (typeof st.top === 'number')  fab.style.top  = st.top  + 'px';
      fab.style.right = 'auto';
      if (typeof st.size === 'number') { fab.style.width = st.size + 'px'; fab.style.height = st.size + 'px'; }
    }
    function save(){
      const rect = fab.getBoundingClientRect();
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          left: rect.left, top: rect.top, size: rect.width
        }));
      } catch(_) {}
    }
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) applyState(JSON.parse(raw));
    } catch(_) {}

    // Keep FAB on-screen across viewport changes
    window.addEventListener('resize', () => {
      if (!fab.classList.contains('placed')) return;
      const rect = fab.getBoundingClientRect();
      const maxL = window.innerWidth - rect.width - 2;
      const maxT = window.innerHeight - rect.height - 2;
      const left = Math.min(Math.max(2, rect.left), maxL);
      const top  = Math.min(Math.max(2, rect.top),  maxT);
      fab.style.left = left + 'px';
      fab.style.top  = top  + 'px';
      save();
    });

    // ── Drag ──
    let dragging = false, dx = 0, dy = 0, downX = 0, downY = 0, moved = false;
    fab.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.mux-fab-resize')) return; // handled by resizer
      dragging = true; moved = false;
      const rect = fab.getBoundingClientRect();
      dx = e.clientX - rect.left;
      dy = e.clientY - rect.top;
      downX = e.clientX; downY = e.clientY;
      fab.setPointerCapture(e.pointerId);
      fab.classList.add('dragging');
    });
    fab.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      if (!moved && (Math.abs(e.clientX - downX) > 3 || Math.abs(e.clientY - downY) > 3)) {
        moved = true;
        fab.classList.add('placed');
        fab.style.right = 'auto';
      }
      if (!moved) return;
      const w = fab.offsetWidth, h = fab.offsetHeight;
      const left = Math.min(Math.max(2, e.clientX - dx), window.innerWidth  - w - 2);
      const top  = Math.min(Math.max(2, e.clientY - dy), window.innerHeight - h - 2);
      fab.style.left = left + 'px';
      fab.style.top  = top  + 'px';
    });
    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      fab.classList.remove('dragging');
      try { fab.releasePointerCapture(e.pointerId); } catch(_) {}
      if (moved) { fabDidInteract = true; save(); }
    };
    fab.addEventListener('pointerup', endDrag);
    fab.addEventListener('pointercancel', endDrag);

    // ── Resize (corner handle) ──
    let resizing = false, startSize = 0, startCX = 0, startCY = 0, anchorR = 0, anchorB = 0;
    fabResize.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      resizing = true;
      startSize = fab.offsetWidth;
      const rect = fab.getBoundingClientRect();
      anchorR = rect.right; anchorB = rect.bottom;
      startCX = e.clientX; startCY = e.clientY;
      fabResize.setPointerCapture(e.pointerId);
      fab.classList.add('dragging');
    });
    fabResize.addEventListener('pointermove', (e) => {
      if (!resizing) return;
      const delta = Math.max(e.clientX - startCX, e.clientY - startCY);
      const size  = Math.min(96, Math.max(24, startSize + delta));
      fab.style.width = size + 'px';
      fab.style.height = size + 'px';
      // Keep bottom-right corner anchored (so it grows toward upper-left)
      fab.classList.add('placed');
      fab.style.right = 'auto';
      fab.style.left = (anchorR - size) + 'px';
      fab.style.top  = (anchorB - size) + 'px';
    });
    const endResize = (e) => {
      if (!resizing) return;
      resizing = false;
      fab.classList.remove('dragging');
      try { fabResize.releasePointerCapture(e.pointerId); } catch(_) {}
      fabDidInteract = true;
      save();
    };
    fabResize.addEventListener('pointerup', endResize);
    fabResize.addEventListener('pointercancel', endResize);

    // Double-click resize handle to reset
    // ── Pinch-to-resize (touch) on the FAB body ──
    const ptrs = new Map();
    let pinchStartDist = 0, pinchStartSize = 0, pinchAnchorR = 0, pinchAnchorB = 0;
    function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
    fab.addEventListener('pointerdown', (e) => {
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size === 2) {
        // Start pinch
        const pts = Array.from(ptrs.values());
        pinchStartDist = dist(pts[0], pts[1]);
        pinchStartSize = fab.offsetWidth;
        const rect = fab.getBoundingClientRect();
        pinchAnchorR = rect.right; pinchAnchorB = rect.bottom;
        // Cancel any in-progress drag so pinch wins
        try { fab.releasePointerCapture(e.pointerId); } catch(_) {}
        fab.classList.add('dragging');
      }
    });
    fab.addEventListener('pointermove', (e) => {
      if (!ptrs.has(e.pointerId)) return;
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size >= 2 && pinchStartDist > 0) {
        const pts = Array.from(ptrs.values());
        const d = dist(pts[0], pts[1]);
        const ratio = d / pinchStartDist;
        const size = Math.min(96, Math.max(24, Math.round(pinchStartSize * ratio)));
        fab.classList.add('placed');
        fab.style.right = 'auto';
        fab.style.width = size + 'px';
        fab.style.height = size + 'px';
        fab.style.left = (pinchAnchorR - size) + 'px';
        fab.style.top  = (pinchAnchorB - size) + 'px';
        fabDidInteract = true;
      }
    });
    const clearPtr = (e) => {
      ptrs.delete(e.pointerId);
      if (ptrs.size < 2) {
        if (pinchStartDist > 0) {
          pinchStartDist = 0;
          fab.classList.remove('dragging');
          save();
        }
      }
    };
    fab.addEventListener('pointerup', clearPtr);
    fab.addEventListener('pointercancel', clearPtr);
    fab.addEventListener('pointerleave', clearPtr);

    fabResize.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      try { localStorage.removeItem(LS_KEY); } catch(_) {}
      fab.classList.remove('placed');
      fab.style.left = ''; fab.style.top = ''; fab.style.right = '';
      fab.style.width = ''; fab.style.height = '';
      fabDidInteract = true;
    });
  })();
  closeBt.addEventListener('click', closePanel);
  maxBtn.addEventListener('click', () => panel.classList.toggle('maximized'));
  rldBtn.addEventListener('click', () => { if (currentUrl) load(currentUrl); });
  extBtn.addEventListener('click', () => { if (currentUrl) window.open(currentUrl, '_blank', 'noopener'); });
  popBtn.addEventListener('click', () => {
    if (!currentUrl) return;
    window.open(currentUrl, 'mux_preview_popout', 'width=900,height=700,noopener');
  });
  goBtn.addEventListener('click', () => load(urlIn.value));
  urlIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); load(urlIn.value); } });

  (function initDrag(){
    let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0;
    header.addEventListener('pointerdown', (e) => {
      if (isMobile()) return;
      if (e.target.closest('input, button')) return;
      if (panel.classList.contains('maximized')) return;
      dragging = true;
      header.setPointerCapture(e.pointerId);
      const rect = panel.getBoundingClientRect();
      origX = rect.left; origY = rect.top;
      startX = e.clientX; startY = e.clientY;
      document.body.classList.add('mux-preview-dragging');
    });
    header.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const nx = origX + (e.clientX - startX);
      const ny = origY + (e.clientY - startY);
      const maxX = window.innerWidth  - 80;
      const maxY = window.innerHeight - 40;
      panel.style.left = Math.min(maxX, Math.max(-panel.offsetWidth + 80, nx)) + 'px';
      panel.style.top  = Math.min(maxY, Math.max(0, ny)) + 'px';
    });
    const end = (e) => {
      if (!dragging) return;
      dragging = false;
      try { header.releasePointerCapture(e.pointerId); } catch(_) {}
      document.body.classList.remove('mux-preview-dragging');
    };
    header.addEventListener('pointerup', end);
    header.addEventListener('pointercancel', end);
  })();

  (function initResize(){
    let resizing = false, startX = 0, startY = 0, origW = 0, origH = 0;
    resizer.addEventListener('pointerdown', (e) => {
      if (isMobile()) return;
      if (panel.classList.contains('maximized')) return;
      resizing = true;
      resizer.setPointerCapture(e.pointerId);
      const rect = panel.getBoundingClientRect();
      origW = rect.width; origH = rect.height;
      startX = e.clientX; startY = e.clientY;
      document.body.classList.add('mux-preview-resizing');
      e.preventDefault();
    });
    resizer.addEventListener('pointermove', (e) => {
      if (!resizing) return;
      const w = Math.max(280, origW + (e.clientX - startX));
      const h = Math.max(200, origH + (e.clientY - startY));
      panel.style.width  = Math.min(window.innerWidth  - 20, w) + 'px';
      panel.style.height = Math.min(window.innerHeight - 20, h) + 'px';
    });
    const end = (e) => {
      if (!resizing) return;
      resizing = false;
      try { resizer.releasePointerCapture(e.pointerId); } catch(_) {}
      document.body.classList.remove('mux-preview-resizing');
    };
    resizer.addEventListener('pointerup', end);
    resizer.addEventListener('pointercancel', end);
  })();

  // Cursor-following hint pill on file-row hover (composable, no per-row DOM edits).
  (function bindCursorHint(){
    const isCoarse = window.matchMedia('(hover: none), (pointer: coarse)').matches;
    if (isCoarse) return; // mobile/touch: hover hint isn't useful

    const pill = document.createElement('div');
    pill.id = 'mux-cursor-hint';
    pill.textContent = 'click: download · right-click: preview';
    document.body.appendChild(pill);

    let activeRow = null;
    function position(e){
      // Place pill to the right of the cursor, vertically centered on it.
      const x = e.clientX + 14;
      const y = e.clientY;
      // Keep within viewport
      const maxX = window.innerWidth - pill.offsetWidth - 6;
      pill.style.left = Math.min(x, maxX) + 'px';
      pill.style.top  = y + 'px';
    }
    document.addEventListener('pointermove', (e) => {
      const row = e.target.closest && e.target.closest('.file-item-container');
      if (row && row.dataset.isdir !== 'true') {
        if (activeRow !== row) {
          activeRow = row;
          pill.classList.add('show');
        }
        position(e);
      } else if (activeRow) {
        activeRow = null;
        pill.classList.remove('show');
      }
    });
    document.addEventListener('pointerleave', () => { activeRow = null; pill.classList.remove('show'); }, true);
    // Hide while dragging/scrolling
    window.addEventListener('scroll', () => { activeRow = null; pill.classList.remove('show'); }, true);
  })();

  // Integration: right-click / long-press on a file row opens the preview.
  (function bindFileList(){
    let lpTimer = null, lpTarget = null;
    function previewRow(row){
      if (!row || row.dataset.isdir === 'true') return;
      const path = row.dataset.path;
      if (!path) return;
      const tab = (typeof window.currentTab !== 'undefined') ? window.currentTab : 'sandbox';
      const enc = String(path).split(/[\\/]/).map(encodeURIComponent).join('/');
      window.MuxPreview.show('/api/download/' + tab + '/' + enc);
    }
    document.addEventListener('contextmenu', (e) => {
      const row = e.target.closest('.file-item-container');
      if (!row) return;
      e.preventDefault();
      previewRow(row);
    });
    document.addEventListener('pointerdown', (e) => {
      const row = e.target.closest('.file-item-container');
      if (!row) return;
      lpTarget = row;
      clearTimeout(lpTimer);
      lpTimer = setTimeout(() => { previewRow(lpTarget); lpTarget = null; }, 550);
    });
    const cancel = () => { clearTimeout(lpTimer); lpTarget = null; };
    document.addEventListener('pointerup', cancel);
    document.addEventListener('pointercancel', cancel);
    document.addEventListener('pointermove', (e) => {
      if (!lpTarget) return;
      if (Math.abs(e.movementX) + Math.abs(e.movementY) > 6) cancel();
    });
  })();

  window.MuxPreview = {
    show(src, opts) { openPanel(); load(src, opts); },
    open: openPanel, close: closePanel, load: load
  };
})();
</script>

<style>
  .mux-settings-backdrop {

  .mux-settings-body:hover::-webkit-scrollbar-thumb { background: var(--muted, #71717a); background-clip: content-box; }

  .mux-settings details { border-top: 1px solid var(--border, #2a2a30); padding: 6px 0; }

    display: flex; align-items: center; gap: 6px;

  .mux-settings summary::-webkit-details-marker { display: none; }
  .mux-settings summary::before { content: '\25b8'; color: var(--muted, #71717a); font-size: 10px; transition: transform 0.15s; }

  .mux-row { display: flex; align-items: center; gap: 10px; padding: 6px 4px; font-size: 12px; }

  .mux-toggle {

    cursor: pointer; transition: background 0.15s;
  }
  .mux-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--text, #e4e4e7); transition: transform 0.15s;
  }
  .mux-toggle.on { background: var(--accent, #64b4dc); }
  .mux-toggle.on::after { transform: translateX(14px); }

  .mux-seg { display: flex; gap: 0; border: 1px solid var(--border, #2a2a30); border-radius: 6px; overflow: hidden; flex: 0 0 auto; }
  .mux-seg button {
    background: transparent; color: var(--muted, #71717a);
    border: 0; padding: 4px 8px; font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .mux-seg button.active { background: var(--accent, #64b4dc); color: #fff; }

  .mux-settings-foot {
    display: flex; gap: 6px; padding: 8px 12px;
    border-top: 1px solid var(--border, #2a2a30);
    background: var(--bg-card, #1a1a1f); justify-content: flex-end;
  }
  .mux-settings-btn {
    background: transparent; border: 1px solid var(--border, #2a2a30);
    color: var(--text, #e4e4e7);
    padding: 6px 10px; font-size: 11px; border-radius: 5px;
    cursor: pointer; font-family: inherit;
  }
  .mux-settings-btn:hover { background: rgba(255,255,255,0.05); }
  .mux-settings-btn.danger { color: #f87171; border-color: rgba(248,113,113,0.4); }

  body.hide-tokens .mux-token-badge { display: none !important; }
  body.hide-saved-banner .mux-save-banner { display: none !important; }
  body.hide-timestamps .msg-time { display: none !important; }

  body.lock-preview-fab .mux-preview-fab { cursor: pointer !important; touch-action: auto !important; }
  body.lock-preview-fab .mux-preview-fab .mux-fab-resize { display: none !important; }

  body.path-compact .mux-save-banner [data-full] { display: none; }
  body:not(.path-compact) .mux-save-banner [data-compact] { display: none; }
  body.path-redacted .mux-save-banner .mux-path-user { display: none; }

  @media (max-width: 640px) {
    .mux-settings-backdrop { padding: 0; align-items: stretch; }
    .mux-settings { width: 100%; max-height: 100vh; border-radius: 0; }
  }
</style>

<script>
(function(){
  const LS_KEY = 'muxSettings.v1';
  const DEFAULTS = {
    showTokens: true,
    showSavedBanner: true,
    showTimestamps: true,
    showAgentBadge: true,
    showCharCounter: true,
    showMic: true,
    showUpload: true,
    showPreviewFab: true,
    lockPreviewFab: false,
    sendOnEnter: 'enter',
    pathMode: 'full'
  };
  function loadState(){
    try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(LS_KEY) || '{}')); }
    catch(_) { return Object.assign({}, DEFAULTS); }
  }
  function saveState(st){ try { localStorage.setItem(LS_KEY, JSON.stringify(st)); } catch(_) {} }
  let state = loadState();

  function apply(){
    const b = document.body;
    b.classList.toggle('hide-tokens',        !state.showTokens);
    b.classList.toggle('hide-saved-banner',  !state.showSavedBanner);
    b.classList.toggle('hide-timestamps',    !state.showTimestamps);
    b.classList.toggle('hide-agent-badge',   !state.showAgentBadge);
    b.classList.toggle('hide-char-counter',  !state.showCharCounter);
    b.classList.toggle('hide-mic',           !state.showMic);
    b.classList.toggle('hide-upload',        !state.showUpload);
    b.classList.toggle('hide-preview-fab',   !state.showPreviewFab);
    b.classList.toggle('lock-preview-fab',    state.lockPreviewFab);
    b.classList.toggle('path-compact',        state.pathMode === 'compact');
    b.classList.toggle('path-redacted',       state.pathMode === 'redacted');
    b.dataset.sendOnEnter = state.sendOnEnter;
  }

  function renderUI(){
    const body = document.getElementById('muxSettingsBody');
    body.innerHTML = '';
    function section(title, rows){
      const det = document.createElement('details'); det.open = true;
      const sum = document.createElement('summary'); sum.textContent = title;
      det.appendChild(sum); rows.forEach(r => det.appendChild(r));
      body.appendChild(det);
    }
    function toggleRow(key, label, desc){
      const row = document.createElement('div'); row.className = 'mux-row';
      const wrap = document.createElement('div'); wrap.style.flex = '1';
      const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = label;
      wrap.appendChild(lbl);
      if (desc) { const d = document.createElement('div'); d.className = 'desc'; d.textContent = desc; wrap.appendChild(d); }
      row.appendChild(wrap);
      const tog = document.createElement('div'); tog.className = 'mux-toggle' + (state[key] ? ' on' : '');
      tog.setAttribute('role','switch'); tog.setAttribute('aria-checked', !!state[key]);
      tog.addEventListener('click', () => {
        state[key] = !state[key];
        tog.classList.toggle('on', state[key]);
        tog.setAttribute('aria-checked', !!state[key]);
        saveState(state); apply();
      });
      row.appendChild(tog);
      return row;
    }
    function segRow(key, label, options, desc){
      const row = document.createElement('div'); row.className = 'mux-row';
      const wrap = document.createElement('div'); wrap.style.flex = '1';
      const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = label;
      wrap.appendChild(lbl);
      if (desc) { const d = document.createElement('div'); d.className = 'desc'; d.textContent = desc; wrap.appendChild(d); }
      row.appendChild(wrap);
      const seg = document.createElement('div'); seg.className = 'mux-seg';
      options.forEach(opt => {
        const b = document.createElement('button');
        b.textContent = opt.label; b.dataset.v = opt.value;
        if (state[key] === opt.value) b.classList.add('active');
        b.addEventListener('click', () => {
          state[key] = opt.value;
          seg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x.dataset.v === opt.value));
          saveState(state); apply();
        });
        seg.appendChild(b);
      });
      row.appendChild(seg);
      return row;
    }
    function actionRow(label, btnLabel, onClick, desc){
      const row = document.createElement('div'); row.className = 'mux-row';
      const wrap = document.createElement('div'); wrap.style.flex = '1';
      const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = label;
      wrap.appendChild(lbl);
      if (desc) { const d = document.createElement('div'); d.className = 'desc'; d.textContent = desc; wrap.appendChild(d); }
      row.appendChild(wrap);
      const b = document.createElement('button'); b.className = 'mux-settings-btn';
      b.textContent = btnLabel; b.addEventListener('click', onClick);
      row.appendChild(b);
      return row;
    }

    section('Display', [
      toggleRow('showTokens',       'Show tokens-in-context badge'),
      toggleRow('showSavedBanner',  'Show session-saved banner'),
      toggleRow('showTimestamps',   'Show message timestamps'),
      toggleRow('showAgentBadge',   'Show agent name badges'),
      toggleRow('showCharCounter',  'Show character counter'),
    ]);
    section('Paths & Privacy', [
      segRow('pathMode', 'Session path display',
        [{label:'Full', value:'full'}, {label:'Compact', value:'compact'}, {label:'Redact user', value:'redacted'}],
        'Applies to the session-saved banner.'),
    ]);
    section('Composer', [
      toggleRow('showMic',    'Show mic button'),
      toggleRow('showUpload', 'Show upload button'),
      segRow('sendOnEnter', 'Send shortcut',
        [{label:'Enter', value:'enter'}, {label:'Ctrl+Enter', value:'ctrl'}],
        'Enter: send (Shift+Enter newline). Ctrl/Cmd+Enter: send only with modifier.'),
    ]);
    section('Preview FAB', [
      toggleRow('showPreviewFab', 'Show preview FAB'),
      toggleRow('lockPreviewFab', 'Lock FAB position & size', 'Disables drag and resize handle.'),
      actionRow('Reset FAB position/size', 'Reset', () => {
        try { localStorage.removeItem('muxPreviewFab.pos'); } catch(_) {}
        const fab = document.getElementById('muxPreviewFab');
        if (fab) { fab.classList.remove('placed'); fab.style.cssText = ''; }
      }),
    ]);
  }

  const backdrop = document.getElementById('muxSettingsBackdrop');
  function openPanel(){ renderUI(); backdrop.classList.add('open'); }
  function closePanel(){ backdrop.classList.remove('open'); }
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closePanel(); });
  document.getElementById('muxSettingsClose').addEventListener('click', closePanel);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && backdrop.classList.contains('open')) closePanel(); });

  document.getElementById('muxSettingsReset').addEventListener('click', () => {
    state = Object.assign({}, DEFAULTS); saveState(state); apply(); renderUI();
  });
  document.getElementById('muxSettingsExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'mux-settings.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  });
  document.getElementById('muxSettingsImport').addEventListener('click', () => {
    const f = document.createElement('input'); f.type = 'file'; f.accept = 'application/json,.json';
    f.addEventListener('change', () => {
      const file = f.files && f.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          state = Object.assign({}, DEFAULTS, data); saveState(state); apply(); renderUI();
        } catch(_) { alert('Invalid settings file'); }
      };
      r.readAsText(file);
    });
    f.click();
  });

  function mountGear(){
    const host = document.querySelector('.header-actions');
    const btn = document.getElementById('muxSettingsBtn');
    if (!host || !btn) return false;
    host.appendChild(btn);
    btn.style.display = '';
    btn.addEventListener('click', openPanel);
    return true;
  }
  if (!mountGear()) {
    const obs = new MutationObserver(() => { if (mountGear()) obs.disconnect(); });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function decorateMessages(root){
    if (!root || !root.querySelectorAll) return;
    root.querySelectorAll('.event, [class*="event"]').forEach(el => {
      const txt = (el.textContent || '').trim();
      if (!el.classList.contains('mux-token-badge') && /tokens?\s+in\s+context/i.test(txt) && txt.length < 80) {
        el.classList.add('mux-token-badge');
      }
      if (!el.classList.contains('mux-save-banner') && /\bSaved to\b/i.test(txt) && txt.length < 500) {
        el.classList.add('mux-save-banner');
        enrichSaveBanner(el);
      }
    });
  }
  function enrichSaveBanner(el){
    const m = el.textContent.match(/Saved to\s+([^\s][^\n]*)$/);
    if (!m) return;
    const fullPath = m[1].trim();
    const winUserMatch = fullPath.match(/^([A-Za-z]:\\Users\\)([^\\]+)(\\.*)$/);
    const nixUserMatch = fullPath.match(/^(\/home\/)([^/]+)(\/.*)$/);
    const dots = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
    const redacted = winUserMatch
      ? winUserMatch[1] + dots + winUserMatch[3]
      : (nixUserMatch ? nixUserMatch[1] + dots + nixUserMatch[3] : fullPath);
    const compact = fullPath.split(/[\\/]/).slice(-3).join('/');
    const before = el.innerHTML.replace(/Saved to\s+[^<]+$/, 'Saved to ');
    el.innerHTML = before +
      '<span class="mux-path mux-path-user" data-full>' + escapeHtml(fullPath) + '</span>' +
      '<span class="mux-path mux-path-redacted">' + escapeHtml(redacted) + '</span>' +
      '<span class="mux-path" data-compact>' + escapeHtml(compact) + '</span>' +
      '';
    el.dataset.fullPath = fullPath;
  }

  const outputRoot = document.querySelector('.output') || document.body;
  decorateMessages(outputRoot);
  const msgObs = new MutationObserver(muts => {
    for (const m of muts) {
      m.addedNodes.forEach(n => {
        if (n.nodeType !== 1) return;
        decorateMessages(n.parentNode || outputRoot);
      });
    }
  });
  msgObs.observe(outputRoot, { childList: true, subtree: true });

  apply();

  window.MuxSettings = {
    open: openPanel,
    close: closePanel,
    get: () => Object.assign({}, state),
    set: (patch) => { state = Object.assign({}, state, patch); saveState(state); apply(); }
  };
})();
</script>

      'circle':       '<circle cx="128" cy="128" r="96"/>'
    }
  };

  // Preset → pack map. (Phosphor Bold/Tabler/Heroicons Solid can be added later; for now we ship phosphor.)
  const PRESET_PACK = {
    zinc: null, ocean: null, light: null, latte: null, // null = leave original Lucide SVG inner HTML alone
    mocha: 'phosphor', macchiato: 'phosphor', frappe: 'phosphor',
    tokyonight: 'phosphor',   // (Phosphor Bold pack will replace this later)
    nord: 'phosphor',         // (Tabler will replace this later)
    matrix: 'phosphor'        // (Heroicons Solid will replace this later)
  };

  const PACKS = { phosphor };

  // Cache the original Lucide HTML on first run so we can restore on theme switch.
  function cacheOriginals(){
    document.querySelectorAll('svg[data-icon]').forEach(svg => {
      if (svg.dataset.iconOriginal === undefined) {
        svg.dataset.iconOriginal = svg.innerHTML;
        svg.dataset.iconOrigVb   = svg.getAttribute('viewBox') || '0 0 24 24';
      }
    });
  }

  function applyPack(packName){
    cacheOriginals();
    const pack = packName ? PACKS[packName] : null;
    document.querySelectorAll('svg[data-icon]').forEach(svg => {
      const name = svg.getAttribute('data-icon');
      if (pack && pack.paths[name]) {
        svg.setAttribute('viewBox', pack.viewBox);
        if (pack.attrs) {
          for (const k in pack.attrs) svg.setAttribute(k, pack.attrs[k]);
        }
        svg.innerHTML = pack.paths[name];
      } else {
        // Restore original
        svg.setAttribute('viewBox', svg.dataset.iconOrigVb);
        svg.innerHTML = svg.dataset.iconOriginal;
      }
    });
  }

  function currentPreset(){
    return document.body.dataset.themePreset || 'zinc';
  }

  function syncToTheme(){
    applyPack(PRESET_PACK[currentPreset()] || null);
  }

  // Run on boot + whenever themePreset changes
  syncToTheme();
  // Observe body data-attribute mutations
  const obs = new MutationObserver(muts => {
    for (const m of muts) {
      if (m.type === 'attributes' && m.attributeName === 'data-theme-preset') {
        syncToTheme(); break;
      }
    }
  });
  obs.observe(document.body, { attributes: true, attributeFilter: ['data-theme-preset'] });

  // Watch for newly-added SVGs (e.g. injected by other modules) — re-apply pack to those.
  const dom = new MutationObserver(muts => {
    let dirty = false;
    for (const m of muts) {
      for (const n of m.addedNodes) {
        if (n.nodeType !== 1) continue;
        if (n.matches && n.matches('svg[data-icon]')) { dirty = true; break; }
        if (n.querySelector && n.querySelector('svg[data-icon]')) { dirty = true; break; }
      }
      if (dirty) break;
    }
    if (dirty) syncToTheme();
  });
  dom.observe(document.body, { childList: true, subtree: true });

  // Public API for future expansion
  window.MuxIcons = {
    setPack: applyPack,
    registerPack(name, def){ PACKS[name] = def; if (currentPreset() && PRESET_PACK[currentPreset()] === name) syncToTheme(); },
    mapPresetToPack(preset, pack){ PRESET_PACK[preset] = pack; if (currentPreset() === preset) syncToTheme(); }
  };
})();
