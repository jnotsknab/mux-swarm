
name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: "."

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            label: Windows x64
            artifact: mux-swarm-win-x64
            extension: .exe

          - os: ubuntu-latest
            rid: linux-x64
            label: Linux x64
            artifact: mux-swarm-linux-x64
            extension: ""

          - os: macos-latest
            rid: osx-arm64
            label: macOS ARM64
            artifact: mux-swarm-osx-arm64
            extension: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      # ── Tests ──────────────────────────────────────────────
      # Uncomment when you add a test project.
      # If your test project is in a subfolder, adjust the path.
      #
      # - name: Run tests
      #   run: dotnet test --configuration Release --no-restore --verbosity normal

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -o ./publish

      # Quick sanity check — does the binary exist and run?
      - name: Verify binary
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            ls -lh ./publish/MuxSwarm.exe
          else
            ls -lh ./publish/mux-swarm
            chmod +x ./publish/MuxSwarm
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/
          retention-days: 14