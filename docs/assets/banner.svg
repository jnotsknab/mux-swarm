<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>

    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64C8FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="bevelHi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bevelSh" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" rx="12" fill="url(#bgGradient)"/>
  <rect width="1280" height="320" rx="12" stroke="url(#borderGradient)" stroke-width="1.5" fill="none"/>
  <rect width="1280" height="320" rx="12" fill="url(#bevelHi)"/>
  <rect width="1280" height="320" rx="12" fill="url(#bevelSh)"/>
  <rect x="2" y="2" width="1276" height="316" rx="11" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Background mesh — left -->
  <g opacity="0.12" stroke="#64C8FF" stroke-width="0.8" stroke-linecap="round">
    <line x1="80" y1="90" x2="140" y2="130"/>
    <line x1="140" y1="130" x2="100" y2="180"/>
    <line x1="80" y1="90" x2="100" y2="180"/>
    <line x1="140" y1="130" x2="200" y2="100"/>
    <line x1="200" y1="100" x2="220" y2="170"/>
    <line x1="140" y1="130" x2="220" y2="170"/>
    <line x1="100" y1="180" x2="170" y2="230"/>
    <line x1="220" y1="170" x2="170" y2="230"/>
  </g>

  <!-- Background mesh — right -->
  <g opacity="0.12" stroke="#64C8FF" stroke-width="0.8" stroke-linecap="round">
    <line x1="1060" y1="80" x2="1120" y2="120"/>
    <line x1="1120" y1="120" x2="1080" y2="180"/>
    <line x1="1060" y1="80" x2="1080" y2="180"/>
    <line x1="1120" y1="120" x2="1180" y2="90"/>
    <line x1="1180" y1="90" x2="1200" y2="160"/>
    <line x1="1120" y1="120" x2="1200" y2="160"/>
    <line x1="1080" y1="180" x2="1150" y2="230"/>
    <line x1="1200" y1="160" x2="1150" y2="230"/>
  </g>

  <!-- Background mesh nodes — left -->
  <g opacity="0.15">
    <circle cx="80" cy="90" r="3" fill="#A78BFA"/>
    <circle cx="140" cy="130" r="4" fill="#64C8FF"/>
    <circle cx="100" cy="180" r="3" fill="#10B981"/>
    <circle cx="200" cy="100" r="2.5" fill="#A78BFA"/>
    <circle cx="220" cy="170" r="3" fill="#10B981"/>
    <circle cx="170" cy="230" r="2.5" fill="#64C8FF"/>
  </g>

  <!-- Background mesh nodes — right -->
  <g opacity="0.15">
    <circle cx="1060" cy="80" r="3" fill="#A78BFA"/>
    <circle cx="1120" cy="120" r="4" fill="#64C8FF"/>
    <circle cx="1080" cy="180" r="3" fill="#10B981"/>
    <circle cx="1180" cy="90" r="2.5" fill="#A78BFA"/>
    <circle cx="1200" cy="160" r="3" fill="#10B981"/>
    <circle cx="1150" cy="230" r="2.5" fill="#64C8FF"/>
  </g>

  <!-- Scan lines -->
  <line x1="0" y1="106" x2="1280" y2="106" stroke="#64C8FF" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="214" x2="1280" y2="214" stroke="#A78BFA" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Title: Mux-Swarm — centered -->
  <text x="640" y="160" text-anchor="middle" font-size="80" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-weight="700" letter-spacing="-2">
    <tspan fill="#64C8FF">Mux</tspan><tspan fill="#A78BFA">-</tspan><tspan fill="#10B981">Swarm</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="198" text-anchor="middle" fill="#ffffff" font-size="15" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" opacity="0.35" letter-spacing="4">MULTI-AGENT RUNTIME</text>

  <!-- Node cluster — right of title -->
  <g transform="translate(920, 100)">
    <g stroke="#64C8FF" stroke-width="1.2" opacity="0.3" stroke-linecap="round">
      <line x1="40" y1="35" x2="10" y2="12"/>
      <line x1="40" y1="35" x2="70" y2="12"/>
      <line x1="40" y1="35" x2="10" y2="62"/>
      <line x1="40" y1="35" x2="70" y2="62"/>
      <line x1="40" y1="35" x2="40" y2="75"/>
      <line x1="10" y1="12" x2="70" y2="12" opacity="0.2"/>
      <line x1="10" y1="62" x2="70" y2="62" opacity="0.2"/>
      <line x1="10" y1="12" x2="10" y2="62" opacity="0.15"/>
      <line x1="70" y1="12" x2="70" y2="62" opacity="0.15"/>
    </g>

    <circle cx="40" cy="35" r="7" fill="#64C8FF" opacity="0.9" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="35" r="2.8" fill="#0a0a14" opacity="0.4"/>

    <circle cx="10" cy="12" r="4.5" fill="#A78BFA" opacity="0.85" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="12" r="4.5" fill="#A78BFA" opacity="0.85" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="62" r="4.5" fill="#10B981" opacity="0.85" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="62" r="4.5" fill="#10B981" opacity="0.85" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="75" r="4.5" fill="#64C8FF" opacity="0.85" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
